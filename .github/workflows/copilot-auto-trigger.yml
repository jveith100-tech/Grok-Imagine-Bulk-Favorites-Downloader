name: Copilot Auto-Trigger

on:
  pull_request:
    types: [opened, reopened, synchronize]
  workflow_run:
    workflows: ["*"]
    types: [completed]
  issues:
    types: [labeled]

jobs:
  copilot-pr-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Request Copilot Review
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: '@copilot Please review this pull request. Check for bugs, security issues, and suggest improvements.'
            });

  copilot-fix-failure:
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create Issue for Copilot to Fix
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Fix failing workflow: ${context.payload.workflow_run.name} on ${context.payload.workflow_run.head_branch}`,
              body: `The workflow **${context.payload.workflow_run.name}** failed on branch **${context.payload.workflow_run.head_branch}**.\n\nRun: ${context.payload.workflow_run.html_url}\n\n@copilot Please investigate and fix the failure.`,
              labels: ['bug', 'copilot'],
              assignees: ['copilot']
            });

  copilot-auto-assign:
    if: github.event_name == 'issues' && contains(github.event.label.name, 'copilot')
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Assign Issue to Copilot
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              assignees: ['copilot']
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: '@copilot Please implement the changes described in this issue and open a pull request.'
            });
